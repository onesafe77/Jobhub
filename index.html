<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jobs Agent - Cari Kerja Cerdas</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          colors: {
            brand: {
              50: '#e8f4f8',
              100: '#c5e4ef',
              200: '#8ec8de',
              300: '#4dadc9',
              400: '#1a8fb3',
              500: '#0d6e8f',
              600: '#0B4F6C', // Primary Navy-Teal (from logo)
              700: '#093d54',
              800: '#072d3f',
              900: '#041d2a',
            }
          },
          animation: {
            'float': 'float 6s ease-in-out infinite',
            'float-delayed': 'float 6s ease-in-out 3s infinite',
            'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'tilt': 'tilt 10s infinite linear',
            'fade-in-up-3d': 'fade-in-up-3d 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-20px)' },
            },
            tilt: {
              '0%, 50%, 100%': { transform: 'rotate(0deg)' },
              '25%': { transform: 'rotate(1deg)' },
              '75%': { transform: 'rotate(-1deg)' },
            },
            'fade-in-up-3d': {
              '0%': { opacity: '0', transform: 'translateY(40px) rotateX(-20deg) scale(0.95)' },
              '100%': { opacity: '1', transform: 'translateY(0) rotateX(0deg) scale(1)' },
            }
          }
        },
      },
    }
  </script>
  <style>
    .perspective-2000 {
      perspective: 2000px;
    }

    .hover-tilt-3d {
      transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1);
      transform-style: preserve-3d;
    }

    .hover-tilt-3d:hover {
      transform: perspective(1000px) rotateX(4deg) rotateY(-4deg) translateY(-5px);
    }

    .shadow-3d {
      box-shadow: 0 20px 50px -12px rgba(13, 110, 143, 0.25);
    }

    .shadow-3d-hover:hover {
      box-shadow: 0 40px 80px -20px rgba(13, 110, 143, 0.4);
    }

    body {
      margin: 0;
      font-family: 'Plus Jakarta Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Custom scrollbar to keep it clean */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #f1f1f1;
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.40.0"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
